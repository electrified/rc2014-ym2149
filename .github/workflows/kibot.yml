name: "RC2014 YM2149 build"

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - '**/*.kicad_pcb'
      - '**/*.kicad_sch'
      - '**/*.kibot.yaml'
      - '.github/workflows/kibot.yml'
  pull_request:
    branches:
      - '**'
    paths:
      - '**/*.kicad_pcb'
      - '**/*.kicad_sch'
      - '**/*.kibot.yaml'
      - '.github/workflows/kibot.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: '0'
        submodules: recursive

    - name: Get next version
      uses: reecetech/version-increment@2024.10.1
      id: version
      with:
        scheme: semver
        increment: patch

    - name: Save info in environment variables
      run: |
        echo "VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_ENV

    - name: Quick Start
      uses: INTI-CMNB/KiBot@v2_k10
      with:
        dir: Generated

    - name: Archive Generated for release
      run: |
        if ! command -v zip >/dev/null; then sudo apt-get update && sudo apt-get install -y zip; fi
        zip -r "rc2014-ym2149-${{ env.VERSION }}.zip" Generated

    - name: Release version
      uses: softprops/action-gh-release@v2
      if: ${{ github.ref_name == github.event.repository.default_branch }}
      with:
        draft: false
        prerelease: false
        tag_name: "${{ env.VERSION }}"
        files: |
          "rc2014-ym2149-${{ env.VERSION }}.zip"

    - name: Retrieve results
      uses: actions/upload-artifact@v5
      with:
        name: Automatic_outputs
        path: Generated

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
    - uses: actions/checkout@v6

    - name: Retrieve results
      uses: actions/download-artifact@v6
      with:
        name: Automatic_outputs
        path: Generated

    - name: Disable Jekyll
      run: |
        touch Generated/.nojekyll

    - name: Derive deployment folder
      run: |
        SAFE_REF="${GITHUB_REF_NAME//\//-}"
        echo "DEPLOY_SUBDIR=$SAFE_REF" >> "$GITHUB_ENV"

    - name: Deploy navigate results
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ secrets.TOKEN }}
        external_repository: electrified/rc2014-ym2149-site
        publish_branch: main
        publish_dir: ./Generated
        destination_dir: ${{ env.DEPLOY_SUBDIR }}
        keep_files: true
        allow_empty_commit: false
        enable_jekyll: false
